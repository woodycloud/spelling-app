<!DOCTYPE html>
<html lang="zh-CN" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Xinyi SpellQuest</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Xinyi SpellQuest">
    
    <link rel="icon" type="image/png" href="https://img.icons8.com/fluent/48/000000/wizard.png">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluent/180/000000/wizard.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        iosBg: { light: '#f2f2f7', dark: '#1c1c1e' },
                        iosCard: { light: '#ffffff', dark: '#2c2c2e' },
                        iosText: { light: '#1c1c1e', dark: '#f2f2f7' }
                    }
                }
            }
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/dist/confetti.browser.min.js"></script>
    
    <style>
        * {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            outline: none !important;
            -webkit-tap-highlight-color: transparent;
        }
        input, textarea, [contenteditable="true"] {
            -webkit-user-select: text;
            user-select: text;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Helvetica, Arial, sans-serif;
            padding-bottom: calc(env(safe-area-inset-bottom) + 8px);
            padding-top: calc(env(safe-area-inset-top) + 8px);
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        html, body { position: relative; overflow: hidden; height: 100%; -webkit-overflow-scrolling: touch; }
        
        /* 苹果经典双层拟真柔和阴影 */
        .ios-depth {
            box-shadow: 
                0 4px 14px rgba(0, 0, 0, 0.03), 
                0 20px 48px rgba(0, 0, 0, 0.08),
                inset 0 1px 0 rgba(255, 255, 255, 0.6);
        }
        .dark .ios-depth {
            box-shadow: 
                0 4px 14px rgba(0, 0, 0, 0.2), 
                0 20px 48px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        /* 3D 卡片翻转舞台（新增 flex-grow 与自适应高度，确保在所有 iOS 设备上完美居中） */
        .card-perspective {
            perspective: 1200px;
            -webkit-perspective: 1200px;
            position: relative;
            flex-grow: 1; /* 占据剩余中间全部高度 */
            display: flex;
            align-items: center; /* 内部 3D 容器垂直居中 */
            justify-content: center;
        }
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            max-height: 380px; /* 约束卡片最大黄金高度，防止撑变形 */
            min-height: 300px;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            -webkit-transition: -webkit-transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
            -webkit-transform-style: preserve-3d;
        }
        .card-inner.is-flipped {
            transform: rotateY(180deg);
            -webkit-transform: rotateY(180deg);
        }
        
        /* 彻底修复 iOS Safari 穿透与遮挡 Bug */
        .card-front, .card-back {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        
        /* 强制通过 translateZ(1px) 硬件级拉开前后空间，防止渲染穿透 */
        .card-front {
            transform: rotateY(0deg) translateZ(1px);
            -webkit-transform: rotateY(0deg) translateZ(1px);
            z-index: 2;
        }
        .card-back {
            transform: rotateY(180deg) translateZ(1px);
            -webkit-transform: rotateY(180deg) translateZ(1px);
            z-index: 1;
        }

        /* 流光掠影骨架屏 */
        .shimmer {
            background: linear-gradient(90deg, #e5e5ea 25%, #f2f2f7 50%, #e5e5ea 75%);
            background-size: 200% 100%;
            animation: loading-shimmer 1.4s infinite;
        }
        .dark .shimmer {
            background: linear-gradient(90deg, #3a3a3c 25%, #48484a 50%, #3a3a3c 75%);
            background-size: 200% 100%;
            animation: loading-shimmer 1.4s infinite;
        }
        @keyframes loading-shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* 胶囊进度条 */
        .progress-container { width: 100%; background-color: #e5e5ea; border-radius: 999px; height: 6px; overflow: hidden; }
        .dark .progress-container { background-color: #38383a; }
        .progress-bar { height: 100%; border-radius: 999px; background: linear-gradient(90deg, #007aff, #3498ff); transition: width 0.4s cubic-bezier(0.25, 1, 0.5, 1); }
        
        /* 苹果标志性的丝滑阻尼弹性动画 */
        .shake { animation: ios-shake 0.45s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes ios-shake { 15%, 85% { transform: translate3d(-3px, 0, 0); } 30%, 70% { transform: translate3d(4px, 0, 0); } 45%, 65% { transform: translate3d(-5px, 0, 0); } 60% { transform: translate3d(5px, 0, 0); } }
        
        .celebrate { animation: ios-scale 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes ios-scale { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.025); } }
        
        .ghost-input { position: absolute; top: -9999px; left: -9999px; opacity: 0; }
        
        /* 虚拟键盘按键物理弹性恢复 */
        #virtualKeyboard button { transition: background-color 0.1s ease, transform 0.08s ease; }
        #virtualKeyboard button:active { background-color: #b0b0b5 !important; transform: scale(0.90); }
        .dark #virtualKeyboard button:active { background-color: #636366 !important; }

        @media (min-width: 768px) {
            #virtualKeyboard { max-width: 480px; margin-left: auto; margin-right: auto; }
        }
    </style>
</head>
<body class="bg-iosBg-light dark:bg-iosBg-dark text-iosText-light dark:text-iosText-dark min-h-screen p-3 flex flex-col items-center justify-center">

    <!-- iOS 暗黑模式手动切换 -->
    <button onclick="toggleDarkMode()" class="fixed top-3 right-3 z-50 p-2 bg-white/80 dark:bg-black/40 backdrop-blur-md rounded-full shadow-md border border-black/[0.05] dark:border-white/[0.1] active:scale-90 transition">
        <span class="dark:hidden text-lg">🌙</span>
        <span class="hidden dark:inline text-lg">☀️</span>
    </button>

    <!-- 密码屏 -->
    <div id="passwordScreen" class="w-full max-w-sm bg-white/70 dark:bg-[#1c1c1e]/70 backdrop-blur-2xl p-8 my-auto rounded-[32px] ios-depth text-center border border-white/60 dark:border-white/5 transition-all">
        <div class="text-6xl mb-5 drop-shadow-sm">🔑</div>
        <h2 class="text-2xl font-bold tracking-tight mb-1">Xinyi SpellQuest</h2>
        <p class="text-gray-400 dark:text-gray-500 text-xs font-semibold tracking-wide mb-6 uppercase">Please type the passkey</p>
        <input type="password" id="sitePassword" class="w-full p-3.5 bg-gray-200/50 dark:bg-zinc-800/50 rounded-2xl text-center text-2xl tracking-widest focus:bg-white/90 dark:focus:bg-black/90 focus:ring-4 focus:ring-[#007aff]/20 mb-5 transition-all border border-transparent placeholder-gray-400" placeholder="••••••" onkeydown="if(event.key==='Enter') verifyPassword()">
        <button onclick="verifyPassword()" class="w-full bg-[#007aff] hover:bg-[#0066d6] text-white py-3.5 rounded-2xl font-semibold text-sm transition-all active:scale-[0.98] shadow-md shadow-[#007aff]/15">Explore the world</button>
        <p id="passwordError" class="text-[#ff3b30] text-xs font-semibold mt-3 hidden">⚠️ Wrong passkey，Try again</p>
    </div>

    <!-- 游戏主容器（使用 flex-col 且居中对齐，解决 iOS 下容器跑偏问题） -->
    <div id="gameContent" class="w-full max-w-md hidden flex flex-col flex-1 justify-center h-full overflow-hidden">
        <!-- 顶部操作栏 (锁定不被压缩) -->
        <div class="flex-shrink-0">
            <div class="flex justify-between items-center my-2 px-1">
                <div class="flex items-center gap-2 flex-1">
                    <svg class="w-8 h-8 drop-shadow-sm flex-shrink-0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
                        <path d="M40,90 C40,40 160,40 160,90 L170,110 C140,115 60,115 30,110 Z" fill="#a1887f"/>
                        <ellipse cx="100" cy="110" rx="75" ry="10" fill="#8d6e63"/>
                        <circle cx="100" cy="125" r="30" fill="#ffcc80"/>
                        <circle cx="90" cy="120" r="3" fill="#333"/>
                        <circle cx="110" cy="120" r="3" fill="#333"/>
                        <path d="M92,130 Q100,140 108,130" fill="none" stroke="#ff7043" stroke-width="2" stroke-linecap="round"/>
                        <path d="M68,120 Q65,145 75,145 M132,120 Q135,145 125,145" fill="none" stroke="#5d4037" stroke-width="8" stroke-linecap="round"/>
                        <g transform="translate(145, 140) rotate(-35)">
                            <rect x="-3" y="-20" width="6" height="30" rx="2" fill="#81d4fa"/>
                            <polygon points="0,-28 -4,-20 4,-20" fill="#fff59d"/>
                            <circle cx="0" cy="-32" r="4" fill="#e0f7fa" opacity="0.8"/>
                        </g>
                        <g font-family="Arial, sans-serif" font-weight="bold" font-size="22" text-anchor="middle">
                            <text x="50" y="55" fill="#4285f4" transform="rotate(-15 50 55)">A</text>
                            <text x="100" y="35" fill="#ea4335">B</text>
                            <text x="150" y="55" fill="#fabc05" transform="rotate(15 150 55)">C</text>
                        </g>
                    </svg>
                    <h1 class="text-xs font-bold tracking-tight text-left">Xinyi SpellQuest</h1>
                </div>
                <button onclick="resetAllProgress()" class="text-[10px] font-semibold text-gray-400 dark:text-gray-500 hover:text-[#ff3b30] px-2.5 py-1 bg-white dark:bg-[#2c2c2e] border border-black/[0.05] dark:border-white/[0.05] rounded-full shadow-sm transition flex-shrink-0">🔄 重置进度</button>
            </div>
            
            <!-- 分组与设置卡片 -->
            <div class="w-full flex flex-col gap-2 mb-2 bg-white dark:bg-iosCard-dark p-2.5 rounded-2xl shadow-[0_2px_8px_rgba(0,0,0,0.02)] border border-black/[0.02] dark:border-white/[0.02]">
                <div class="flex gap-2">
                    <div class="relative w-1/2 bg-[#f2f2f7] dark:bg-zinc-800 rounded-xl px-1">
                        <select id="groupSelector" onchange="onGroupChange()" class="w-full py-1.5 bg-transparent rounded-xl text-xs font-semibold cursor-pointer text-center appearance-none text-iosText-light dark:text-iosText-dark">
                            <option value="newConcept">🎒 少儿新概念</option>
                            <option value="schoolClass">🏫 学校课堂组</option>
                            <option value="ieltsClass">🗽 雅思词汇</option>
                        </select>
                    </div>
                    <div class="relative w-1/2 bg-[#f2f2f7] dark:bg-zinc-800 rounded-xl px-1">
                        <select id="unitSelector" onchange="onUnitChange()" class="w-full py-1.5 bg-transparent rounded-xl text-xs font-semibold cursor-pointer text-center appearance-none text-iosText-light dark:text-iosText-dark"></select>
                    </div>
                </div>
                
                <div class="bg-[#f2f2f7] dark:bg-zinc-800 py-1 px-2.5 rounded-xl flex items-center justify-between">
                    <span class="text-[10px] font-semibold text-gray-400 dark:text-gray-500">发音口音</span>
                    <div class="flex gap-4">
                        <label class="flex items-center gap-1.5 text-xs font-medium cursor-pointer">
                            <input type="radio" name="accentType" value="2" checked onchange="speakWord()" class="w-4 h-4 accent-[#007aff]"> 美音
                        </label>
                        <label class="flex items-center gap-1.5 text-xs font-medium cursor-pointer">
                            <input type="radio" name="accentType" value="1" onchange="speakWord()" class="w-4 h-4 accent-[#007aff]"> 英音
                        </label>
                    </div>
                </div>

                <!-- 模式切换 -->
                <div class="flex bg-gray-200/80 dark:bg-zinc-800/80 p-0.5 rounded-xl">
                    <button id="mode-spell-btn" onclick="switchMode('spell')" class="flex-1 py-1 rounded-lg font-semibold text-xs bg-white dark:bg-zinc-700 shadow-sm transition-all duration-200 text-iosText-light dark:text-iosText-dark">拼读挑战</button>
                    <button id="mode-card-btn" onclick="switchMode('card')" class="flex-1 py-1 rounded-lg font-semibold text-xs text-gray-400 dark:text-gray-500 transition-all duration-200">卡片背诵</button>
                </div>
            </div>
        </div>

        <!-- 3D卡片翻转舞台（稳定高度区间，iOS完美垂直居中） -->
        <div id="mainCard" class="card-perspective my-3">
            <div id="cardInner" class="card-inner">
                
                <!-- 3D 卡片正面 -->
                <div class="card-front bg-white dark:bg-iosCard-dark p-4 rounded-[24px] ios-depth border border-black/[0.01] dark:border-white/[0.02]">
                    <div>
                        <div class="flex justify-between items-center text-[10px] font-semibold text-gray-400 dark:text-gray-500 mb-1 px-0.5">
                            <span id="progressTitle">冒险进度</span>
                            <span id="progressText" class="text-[#007aff]">0%</span>
                        </div>
                        <div class="progress-container">
                            <div id="progressBar" class="progress-bar" style="width: 0%"></div>
                        </div>
                    </div>

                    <!-- 核心内容展示窗 (精细微调防穿透，比例绝佳) -->
                    <div class="p-3 bg-[#f2f2f7]/60 dark:bg-zinc-800/40 rounded-xl text-center flex-1 flex flex-col justify-center items-center min-h-[130px] relative border border-black/[0.01] dark:border-white/[0.02] my-2">
                        <div class="flex items-center justify-center gap-3 my-1 w-full">
                            <div id="emoji" class="text-5xl filter drop-shadow-sm flex-shrink-0 transition-transform duration-300">🍎</div>
                            <!-- 彻底锁定尺寸的防溢出容器 -->
                            <div id="netImageContainer" class="hidden relative w-[95px] h-[95px] sm:w-[115px] sm:h-[115px] rounded-[16px] overflow-hidden bg-white dark:bg-zinc-800 shadow-sm border border-black/5 dark:border-white/5 flex-shrink-0" style="min-width: 95px; min-height: 95px; max-width: 115px; max-height: 115px;">
                                <div id="imageShimmer" class="shimmer absolute inset-0 z-10"></div>
                                <img id="netImage" src="" class="opacity-0 transition-opacity duration-500 z-20 block" alt="illustration" onerror="handleImageError()" style="width: 100% !important; height: 100% !important; max-width: 100% !important; max-height: 100% !important; object-fit: cover !important; position: absolute !important; top: 0 !important; left: 0 !important;">
                            </div>
                        </div>
                        
                        <!-- 释义提示区 -->
                        <div id="spellHintArea" class="min-h-[28px] flex items-center justify-center w-full mt-1">
                            <div id="descContainer" class="hidden flex flex-col items-center gap-0.5">
                                <span id="desc" class="text-sm font-semibold">正在加载...</span>
                                <span id="phonetic" class="text-[10px] text-gray-400 dark:text-gray-500 font-mono"></span>
                            </div>
                            <button id="hintBtn" onclick="event.stopPropagation(); toggleHint();" class="text-[10px] font-semibold bg-white dark:bg-zinc-700 border border-[#d1d1d6] dark:border-zinc-600 px-3 py-1 rounded-full shadow-sm active:bg-gray-100 dark:active:bg-zinc-600 transition-all">显示中文提示</button>
                        </div>

                        <!-- 字母拼写槽 -->
                        <div id="letterSlots" class="flex justify-center flex-wrap gap-1 text-xl font-bold tracking-wide min-h-[44px] mt-auto w-full px-1"></div>
                    </div>

                    <!-- 拼写模式操作按钮 -->
                    <div id="spellActionButtons" class="grid grid-cols-2 gap-2 mt-auto">
                        <button onclick="event.stopPropagation(); speakWord();" class="bg-[#f2f2f7] dark:bg-zinc-800 hover:bg-[#e5e5ea] text-[#007aff] py-2.5 rounded-xl font-semibold text-xs flex items-center justify-center gap-1 active:scale-[0.98] transition-all"><span>听发音 🔊</span></button>
                        <button onclick="event.stopPropagation(); check();" class="bg-[#007aff] hover:bg-[#0066d6] text-white py-2.5 rounded-xl font-semibold text-xs shadow-sm active:scale-[0.98] transition-all">检查结果</button>
                    </div>

                    <!-- 借用背诵模式正面遮罩按钮 -->
                    <div id="cardFrontActionButtons" class="hidden mt-auto">
                        <button onclick="event.stopPropagation(); flipToBack();" class="w-full bg-[#007aff] hover:bg-[#0066d6] text-white py-3 rounded-xl font-semibold text-xs shadow-md shadow-[#007aff]/10 transition active:scale-95">
                            👀 显示答案 (Show Answer)
                        </button>
                        <p class="text-center text-[9px] text-gray-400 dark:text-gray-500 mt-1.5">点击卡片或按空格键翻转</p>
                    </div>
                </div>

                <!-- 3D 卡片背面 -->
                <div class="card-back bg-white dark:bg-iosCard-dark p-4 rounded-[24px] ios-depth border border-black/[0.01] dark:border-white/[0.02]">
                    <div>
                        <div class="flex justify-between items-center text-[10px] font-semibold text-gray-400 dark:text-gray-500 mb-1 px-0.5">
                            <span>卡片解读</span>
                            <span id="cardProgressText" class="text-[#34c759]">掌握中</span>
                        </div>
                        <div class="progress-container">
                            <div class="progress-bar" style="width: 100%; background: #34c759;"></div>
                        </div>
                    </div>

                    <!-- 背面内容 -->
                    <div class="p-3 bg-[#f2f2f7]/60 dark:bg-zinc-800/40 rounded-xl text-center flex-1 flex flex-col justify-center items-center min-h-[130px] border border-black/[0.01] dark:border-white/[0.02] my-2">
                        <div id="cardWord" class="text-3xl font-extrabold tracking-tight text-iosText-light dark:text-iosText-dark"></div>
                        <div id="cardPhonetic" class="text-xs text-gray-400 dark:text-gray-500 font-mono mt-0.5"></div>
                        <div id="cardDesc" class="text-lg text-[#007aff] dark:text-[#3498ff] font-semibold mt-2"></div>
                    </div>

                    <!-- Anki 按钮 -->
                    <div id="ankiGradingButtons" class="grid grid-cols-3 gap-2 mt-auto">
                        <button onclick="event.stopPropagation(); handleAnkiFeedback('again');" class="bg-[#ff3b30]/10 hover:bg-[#ff3b30]/15 text-[#ff3b30] py-2 rounded-xl font-bold text-xs transition border border-[#ff3b30]/15 active:scale-95 flex flex-col items-center">
                            <span>🔴 重来</span>
                            <span class="text-[8px] font-medium opacity-60 mt-0.5">Again [1]</span>
                        </button>
                        <button onclick="event.stopPropagation(); handleAnkiFeedback('good');" class="bg-[#ff9500]/10 hover:bg-[#ff9500]/15 text-[#ff9500] py-2 rounded-xl font-bold text-xs transition border border-[#ff9500]/15 active:scale-95 flex flex-col items-center">
                            <span>🟡 一般</span>
                            <span class="text-[8px] font-medium opacity-60 mt-0.5">Good [2]</span>
                        </button>
                        <button onclick="event.stopPropagation(); handleAnkiFeedback('easy');" class="bg-[#34c759]/10 hover:bg-[#34c759]/15 text-[#34c759] py-2 rounded-xl font-bold text-xs transition border border-[#34c759]/15 active:scale-95 flex flex-col items-center">
                            <span>🟢 简单</span>
                            <span class="text-[8px] font-medium opacity-60 mt-0.5">Easy [3]</span>
                        </button>
                    </div>
                </div>

            </div>
        </div>
        
        <!-- 温习错题库控制组件 -->
        <button onclick="reviewWrongWords()" id="reviewBtn" class="w-full bg-[#ff3b30]/90 hover:bg-[#ff3b30] text-white py-1.5 rounded-xl font-semibold text-xs hidden shadow-sm active:scale-95 transition-all mb-1.5 flex-shrink-0">温习错题库 (0)</button>

        <!-- 本地导入 -->
        <div id="localDropZone" class="hidden p-2.5 mb-1.5 border border-dashed border-[#c7c7cc] bg-white dark:bg-iosCard-dark rounded-xl text-[10px] font-medium text-gray-400 cursor-pointer w-full text-center hover:bg-gray-50 dark:hover:bg-zinc-800 transition flex-shrink-0">
            请点击此处手动导入本地词库 CSV 文件
            <input type="file" id="localFileInp" class="hidden" accept=".csv" onchange="handleFileSelect(this)">
        </div>

        <input type="text" id="userInput" class="ghost-input" autocomplete="off" spellcheck="false" oninput="filterInput(this)" onkeydown="if(event.key==='Enter') check()">
        
        <!-- 虚拟键盘区 (已取消空格键，大幅释放垂直空间) -->
        <div id="virtualKeyboard" class="w-full bg-[#d1d1d6]/70 dark:bg-zinc-800/70 backdrop-blur-xl p-1 rounded-2xl shadow-inner flex flex-col gap-1 flex-shrink-0">
            <div class="flex justify-center gap-1" id="kbd-row1"></div>
            <div class="flex justify-center gap-1" id="kbd-row2"></div>
            <div class="flex justify-center gap-1" id="kbd-row3"></div>
        </div>
    </div>

    <!-- 毛玻璃 Toast -->
    <div id="iosToast" class="fixed bottom-1/3 left-1/2 -translate-x-1/2 bg-black/80 dark:bg-white/90 text-white dark:text-black text-xs font-semibold px-4 py-2.5 rounded-full shadow-lg backdrop-blur-md opacity-0 pointer-events-none transition-all duration-300 transform translate-y-2 z-50">提示</div>

    <audio id="globalAudioPlayer" style="display: none;"></audio>

    <script>
        const CORRECT_PASSWORD = '666';
        const COURSE_DATA = {
            newConcept: [
                { text: "Unit 1 Lesson 1", value: "data/unit1_lesson1.csv" },
                { text: "Unit 1 Lesson 2", value: "data/unit1_lesson2.csv" },

        function playSound(type) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                if(type === 'success') {
                    osc.frequency.setValueAtTime(523.25, ctx.currentTime);
                    osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.08);
                    gain.gain.setValueAtTime(0.08, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.25);
                    osc.start(); osc.stop(ctx.currentTime + 0.25);
                } else {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(180.00, ctx.currentTime);
                    osc.frequency.linearRampToValueAtTime(120.00, ctx.currentTime + 0.18);
                    gain.gain.setValueAtTime(0.06, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
                    osc.start(); osc.stop(ctx.currentTime + 0.2);
                }
                if (navigator.vibrate) {
                    if (type === 'success') navigator.vibrate(30); 
                    else navigator.vibrate([40, 30, 40]);
                }
            } catch(e){}
        }

        function fetchPhonetic(word) {
            if (!word) return;
            const cleanWord = word.trim().toLowerCase().replace(/[^a-zA-Z\s']/g, '');
            const phoneticEl = document.getElementById('phonetic');
            const cardPhoneticEl = document.getElementById('cardPhonetic');
            phoneticEl.innerText = ""; cardPhoneticEl.innerText = "";

            const url = `https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(cleanWord)}`;
            fetch(url)
                .then(res => { if(!res.ok) throw new Error(); return res.json(); })
                .then(data => {
                    if (data && data[0] && data[0].phonetic) {
                        const ph = data[0].phonetic;
                        phoneticEl.innerText = ph; cardPhoneticEl.innerText = ph;
                    } else if (data && data[0] && data[0].phonetics) {
                        const validPh = data[0].phonetics.find(p => p.text);
                        if (validPh) {
                            phoneticEl.innerText = validPh.text; cardPhoneticEl.innerText = validPh.text;
                        }
                    }
                }).catch(() => {
                    phoneticEl.innerText = ""; cardPhoneticEl.innerText = "";
                });
        }

        function parseRawText(text, isInitialLoad = false) {
            Papa.parse(text, {

                complete: r => {

                        document.getElementById('localDropZone').classList.add('hidden');
                        wordBank = r.data; 
                        masteredWords.clear();
                        if (isInitialLoad) {
                            const savedIndex = localStorage.getItem('spell_saved_index');
                            currentIndex = savedIndex ? parseInt(savedIndex, 10) : 0;
                        } else {
                            currentIndex = 0;
                        }
                        showCurrentIndexWord(); 
                    } else { showLoadError("数据空空如也"); }
                }
            });
        }

        function showCurrentIndexWord() {
            let activeBank = isReviewMode ? wrongWords : wordBank;
            document.getElementById('progressTitle').innerText = isReviewMode ? "错题消灭进度" : "冒险进度";

            if(activeBank.length === 0 && isReviewMode) {
                triggerEpicFireworks();
                showToast("🎉 太牛了！错题库已经消灭干净！");
                isReviewMode = false;
                localStorage.removeItem('spell_saved_wrong_words');
                document.getElementById('reviewBtn').classList.add('hidden');
                currentIndex = 0;
                activeBank = wordBank;
            }

            if(currentIndex >= activeBank.length && activeBank.length > 0) {
                if(isReviewMode) {
                    triggerEpicFireworks();
                    showToast("🎉 错题库消灭干净！");
                    isReviewMode = false;
                    wrongWords = [];
                    localStorage.removeItem('spell_saved_wrong_words');
                    document.getElementById('reviewBtn').classList.add('hidden');
                } else {
                    triggerEpicFireworks();
                    showToast("🎉 太棒了！已顺利完成本单元卡片！");
                }
                currentIndex = 0;
                activeBank = isReviewMode ? wrongWords : wordBank;
            }

            if(currentIndex < 0) currentIndex = 0;
            if (!isReviewMode && currentMode === 'spell') localStorage.setItem('spell_saved_index', currentIndex);

            currentWord = activeBank[currentIndex];
            if(!currentWord || !currentWord.word) return;
            currentWord.word = currentWord.word.trim();

            cardSide = 'front';
            document.getElementById('cardInner').classList.remove('is-flipped');

            document.getElementById('emoji').innerText = currentWord.emoji || "📝";
            fetchNetworkImage(currentWord.word); 
            fetchPhonetic(currentWord.word);
            
            currentInputValue = "";
            document.getElementById('userInput').value = "";
            
            // 【后台脱敏验证一】：计算单词长度限制时，统一将其转化为小写计算，解决大写答案对输入长度的干扰
            maxAllowedLetters = (currentWord.word || "").toLowerCase().replace(/[^a-z\s\-]/g, '').length;
            
            renderSlots(currentWord.word);
            renderCurrentWordState();
            
            if (currentMode === 'spell') {
                speakWord();
            }
            updateProgress();
        }

        function handleAnkiFeedback(level) {
            if (currentMode !== 'card') return;
            let activeBank = isReviewMode ? wrongWords : wordBank;
            const cardInner = document.getElementById('cardInner');
            
            if (level === 'again') {
                const current = activeBank.splice(currentIndex, 1)[0];
                activeBank.push(current);
                playSound('error');
                cardInner.classList.add('shake');
                setTimeout(() => cardInner.classList.remove('shake'), 450);
            } else if (level === 'good') {
                currentIndex++;
            } else if (level === 'easy') {
                masteredWords.add(currentWord.word);
                activeBank.splice(currentIndex, 1);
                playSound('success');
                cardInner.classList.add('celebrate');
                setTimeout(() => cardInner.classList.remove('celebrate'), 400);
            }

            cardSide = 'front';
            
            if (activeBank.length === 0) {
                document.getElementById('progressText').innerText = `已掌握: 100%`;
                document.getElementById('progressBar').style.width = `100%`;
                
                triggerEpicFireworks();
                setTimeout(() => {
                    showToast("🎉 当前所有卡片掌握完成！");
                    resetMasteredAndReload();
                }, 400); 
            } else {
                if (currentIndex >= activeBank.length) {
                    currentIndex = 0;
                }
                cardInner.classList.remove('is-flipped');
                setTimeout(() => {
                    showCurrentIndexWord();
                }, 150);
            }
        }

        function resetMasteredAndReload() {
            masteredWords.clear();
            currentIndex = 0;
            isReviewMode = false;
            loadNewUnit();
        }

        function renderSlots(word) {
            const container = document.getElementById('letterSlots');
            container.innerHTML = "";
            if(!word) return;

            const letterCount = word.length;
            let fontSizeClass = "text-xl";
            let paddingClass = "px-0.5 min-w-[12px]";
            if(letterCount > 15) {
                fontSizeClass = "text-[10px]";
                paddingClass = "px-px min-w-[6px]";
            } else if(letterCount > 10) {
                fontSizeClass = "text-sm";
                paddingClass = "px-0.5 min-w-[8px]";
            }

            // 【后台脱敏验证二】：渲染格子底线时，即使标准词库内有大写，格子的核心展示内容也是彻底的“不限大小写”
            for(let i=0; i<word.length; i++) {
                const char = word[i];
                const span = document.createElement('span');
                if(/[a-zA-Z]/.test(char)) {
                    span.innerText = "•";
                    span.className = `text-[#c7c7cc] dark:text-zinc-600 transition-all duration-150 transform translate-y-0.5 ${fontSizeClass} ${paddingClass} text-center`;
                } else if(char === " ") {
                    span.innerHTML = "&nbsp;";
                    span.className = `border-b border-gray-300 dark:border-zinc-700 ${fontSizeClass} ${paddingClass} text-center`;
                    span.dataset.special = "true";
                } else {
                    span.innerText = char;
                    span.className = `text-iosText-light dark:text-iosText-dark font-mono ${fontSizeClass} px-0.5 min-w-[6px] text-center`;
                    span.dataset.special = "true";
                }
                container.appendChild(span);
            }
        }

        // 【后台脱敏验证三】：校验逻辑彻底解除大小写限制
        function check() {
            if(currentMode !== 'spell' || !currentWord.word) return;
            
            // 剔除干扰符号，两边全部强制转换为纯小写对比！
            const target = currentWord.word.trim().toLowerCase().replace(/[^a-z\s\-]/g, '');
            const cleanInput = currentInputValue.trim().toLowerCase().replace(/[^a-z\s\-]/g, '');
            const cardInner = document.getElementById('cardInner');

            if(cleanInput === target) {
                playSound('success');
                cardInner.classList.add('celebrate');
                
                setTimeout(() => {
                    cardInner.classList.remove('celebrate');
                    if(isReviewMode) {
                        wrongWords.splice(currentIndex, 1);
                        localStorage.setItem('spell_saved_wrong_words', JSON.stringify(wrongWords));
                        updateWrongWordsButton();
                        if (currentIndex >= wrongWords.length && wrongWords.length > 0) {
                            currentIndex = wrongWords.length - 1;
                        }
                    } else {
                        let activeBank = wordBank;
                        if(currentIndex === activeBank.length - 1) {
                             document.getElementById('progressText').innerText = `100%`;
                             document.getElementById('progressBar').style.width = `100%`;
                        }
                        currentIndex++;
                    }
                    showCurrentIndexWord();
                }, 400);
            } else {
                playSound('error');
                cardInner.classList.add('shake');
                // 加入错题库时也忽略大小写，避免重复加入
                if(!isReviewMode && !wrongWords.some(w => w.word.toLowerCase().replace(/[^a-z\s\-]/g, '') === target)) {
                    wrongWords.push(currentWord);
                    localStorage.setItem('spell_saved_wrong_words', JSON.stringify(wrongWords));
                    updateWrongWordsButton();
                }
                setTimeout(() => {
                    cardInner.classList.remove('shake');
                    currentInputValue = "";
                    document.getElementById('userInput').value = "";
                    updateSlotsHighlight();
                }, 400);
            }
        }

        function updateProgress() {
            let activeBank = isReviewMode ? wrongWords : wordBank;
            const total = activeBank.length + masteredWords.size;
            if(total === 0) {
                document.getElementById('progressText').innerText = `0%`;
                document.getElementById('progressBar').style.width = `0%`;
                return;
            }
            if (currentMode === 'spell') {
                const percent = Math.min(Math.round(((currentIndex) / activeBank.length) * 100), 100);
                document.getElementById('progressText').innerText = `${percent}%`;
                document.getElementById('progressBar').style.width = `${percent}%`;
            } else {
                const percent = activeBank.length === 0 ? 100 : Math.min(Math.round((masteredWords.size / total) * 100), 99); 
                document.getElementById('progressText').innerText = `已掌握: ${percent}% (剩余 ${activeBank.length} 张)`;
                document.getElementById('progressBar').style.width = `${percent}%`;
            }
        }

        function updateWrongWordsButton() {
            const btn = document.getElementById('reviewBtn');
            btn.innerText = `温习错题库 (${wrongWords.length})`;
            if(wrongWords.length > 0) btn.classList.remove('hidden');
            else btn.classList.add('hidden');
        }

        function reviewWrongWords() {
            if(wrongWords.length === 0) return;
            isReviewMode = true;
            currentIndex = 0;
            showCurrentIndexWord();
        }

        function triggerEpicFireworks() {
            const duration = 2 * 1000;
            const end = Date.now() + duration;
            (function frame() {
                confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0, y: 0.8 } });
                confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1, y: 0.8 } });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        function setupDragAndDrop() {
            const zone = document.getElementById('localDropZone');
            zone.onclick = () => document.getElementById('localFileInp').click();
        }

        function handleFileSelect(input) {
            if(input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) { parseRawText(e.target.result); };
                reader.readAsText(input.files[0]);
            }
        }

        function setupSwipeGestures() {
            const mainCard = document.getElementById('mainCard');
            mainCard.addEventListener('touchstart', function(e) {
                touchStartX = e.changedTouches[0].screenX;
                touchStartY = e.changedTouches[0].screenY;
            }, {passive: true});

            mainCard.addEventListener('touchend', function(e) {
                if (currentMode !== 'card') return; 
                const touchEndX = e.changedTouches[0].screenX;
                const touchEndY = e.changedTouches[0].screenY;
                const diffX = touchEndX - touchStartX;
                const diffY = touchEndY - touchStartY;
                
                if (Math.abs(diffX) > 60 && Math.abs(diffX) > Math.abs(diffY)) {
                    if (cardSide === 'back') {
                        if (diffX < 0) {
                            handleAnkiFeedback('again'); 
                        } else {
                            handleAnkiFeedback('easy');  
                        }
                    } else if (cardSide === 'front') {
                        flipToBack();
                    }
                }
            }, {passive: true});
        }

        function setupPhysicalKeyboardListener() {
            window.addEventListener('keydown', function(e) {
                if (!document.getElementById('passwordScreen').classList.contains('hidden')) return;
                
                if (currentMode === 'card') {
                    if (e.key === ' ') {
                        e.preventDefault();
                        if (cardSide === 'front') {
                            flipToBack();
                        }
                    } else if (cardSide === 'back') {
                        if (e.key === '1') {
                            e.preventDefault();
                            handleAnkiFeedback('again');
                        } else if (e.key === '2') {
                            e.preventDefault();
                            handleAnkiFeedback('good');
                        } else if (e.key === '3') {
                            e.preventDefault();
                            handleAnkiFeedback('easy');
                        }
                    }
                    return;
                }
                
                if (currentMode === 'spell') {
                    if (e.key === 'Backspace') {
                        e.preventDefault();
                        handleKeyInput('BACKSPACE');
                        return;
                    }
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        check();
                        return;
                    }
                    if (/^[a-zA-Z\s\-]$/.test(e.key)) {
                        e.preventDefault();
                        handleKeyInput(e.key.toLowerCase());
                    }
                }
            });
        }

        initDarkMode();
    </script>
</body>
</html>
