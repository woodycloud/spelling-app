<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Xinyi SpellQuest</title>
    
    <!-- 彻底解决苹果 PWA 废弃警告 -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Xinyi SpellQuest">
    
    <!-- 彻底解决 favicon.ico 404 报错 -->
    <link rel="icon" type="image/png" href="https://img.icons8.com/fluent/48/000000/wizard.png">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluent/180/000000/wizard.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/dist/confetti.browser.min.js"></script>
    
    <style>
        * {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        input, textarea, [contenteditable="true"] {
            -webkit-user-select: text;
            user-select: text;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Helvetica, Arial, sans-serif;
            background-color: #f5f5f7; 
            color: #1d1d1f; 
            padding-bottom: calc(env(safe-area-inset-bottom) + 12px);
            padding-top: calc(env(safe-area-inset-top) + 12px);
        }
        html, body { position: relative; overflow: hidden; height: 100%; -webkit-overflow-scrolling: touch; }
        .progress-container { width: 100%; background-color: #e8e8ed; border-radius: 999px; padding: 2px; }
        .progress-bar { height: 6px; border-radius: 999px; background-color: #0071e3; transition: width 0.4s cubic-bezier(0.25, 1, 0.5, 1); }
        
        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } 40%, 60% { transform: translate3d(4px, 0, 0); } }
        .celebrate { animation: celebrate 0.4s cubic-bezier(0.25, 1, 0.5, 1); }
        @keyframes celebrate { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }
        
        .ghost-input { position: absolute; top: -9999px; left: -9999px; opacity: 0; }
        #word-display { display: flex; flex-direction: column; gap: 12px; min-height: 160px; max-height: 46vh; overflow-y: auto; scrollbar-width: none; }
        #word-display::-webkit-scrollbar { display: none; }
        
        #netImageContainer { width: 110px; height: 110px; flex-shrink: 0; margin: 0 auto; }
        #letterSlots { margin-top: auto; padding: 8px 0; min-height: 48px; }
        
        #virtualKeyboard button { transition: background-color 0.1s ease, transform 0.1s ease; }
        #virtualKeyboard button:active { background-color: #545456 !important; transform: scale(0.95); }

        @media (min-width: 768px) {
            #netImageContainer { width: 155px; height: 155px; }
            #emoji { font-size: 5rem !important; }
            #virtualKeyboard { max-width: 480px; margin-left: auto; margin-right: auto; border-radius: 20px; }
        }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col items-center justify-between">

    <div id="passwordScreen" class="w-full max-w-sm bg-white/80 backdrop-blur-xl p-8 my-auto rounded-[24px] shadow-[0_20px_40px_rgba(0,0,0,0.04)] text-center border border-white/40">
        <div class="text-5xl mb-4">🔑</div>
        <h2 class="text-xl font-semibold tracking-tight text-[#1d1d1f] mb-1">✨ Welcome to Xinyi SpellQuest ✨<br>Master Words. Explore Worlds.</h2>
        <p class="text-[#86868b] text-xs mb-6">Please Type the passkey</p>
        <input type="password" id="sitePassword" class="w-full p-3 bg-[#f5f5f7] rounded-xl text-center text-xl tracking-widest focus:bg-white focus:ring-2 focus:ring-[#0071e3] mb-4 transition border border-transparent" placeholder="••••••" onkeydown="if(event.key==='Enter') verifyPassword()">
        <button onclick="verifyPassword()" class="w-full bg-[#0071e3] hover:bg-[#0077ed] text-white py-3 rounded-xl font-medium text-sm transition active:opacity-80 shadow-sm">Explore the world</button>
        <p id="passwordError" class="text-[#ff3b30] text-xs font-normal mt-3 hidden">Wrong passkey，Try again</p>
    </div>

    <div id="gameContent" class="w-full max-w-md hidden flex flex-col flex-1 justify-between h-full">
        <div>
            <div class="flex justify-between items-center my-2 px-1">
                <div class="flex items-center gap-2 flex-1">
                    <svg class="w-8 h-8 drop-shadow-xs flex-shrink-0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
                        <path d="M40,90 C40,40 160,40 160,90 L170,110 C140,115 60,115 30,110 Z" fill="#a1887f"/>
                        <ellipse cx="100" cy="110" rx="75" ry="10" fill="#8d6e63"/>
                        <circle cx="100" cy="125" r="30" fill="#ffcc80"/>
                        <circle cx="90" cy="120" r="3" fill="#333"/>
                        <circle cx="110" cy="120" r="3" fill="#333"/>
                        <path d="M92,130 Q100,140 108,130" fill="none" stroke="#ff7043" stroke-width="2" stroke-linecap="round"/>
                        <path d="M68,120 Q65,145 75,145 M132,120 Q135,145 125,145" fill="none" stroke="#5d4037" stroke-width="8" stroke-linecap="round"/>
                        <g transform="translate(145, 140) rotate(-35)">
                            <rect x="-3" y="-20" width="6" height="30" rx="2" fill="#81d4fa"/>
                            <polygon points="0,-28 -4,-20 4,-20" fill="#fff59d"/>
                            <circle cx="0" cy="-32" r="4" fill="#e0f7fa" opacity="0.8"/>
                        </g>
                        <g font-family="Arial, sans-serif" font-weight="bold" font-size="22" text-anchor="middle">
                            <text x="50" y="55" fill="#4285f4" transform="rotate(-15 50 55)">A</text>
                            <text x="100" y="35" fill="#ea4335">B</text>
                            <text x="150" y="55" fill="#fabc05" transform="rotate(15 150 55)">C</text>
                        </g>
                    </svg>
                    <h1 class="text-base font-bold tracking-tight text-[#1d1d1f] text-left">Xinyi SpellQuest</h1>
                </div>
                <button onclick="resetAllProgress()" class="text-xs text-[#86868b] hover:text-[#ff3b30] px-2 py-1 bg-white border border-[#e8e8ed] rounded-lg shadow-xs transition flex-shrink-0">🔄 重置进度</button>
            </div>
            
            <div class="w-full flex flex-col gap-2.5 mb-3 bg-white p-3 rounded-2xl shadow-[0_4px_12px_rgba(0,0,0,0.01)] border border-[#e8e8ed]">
                <div class="flex gap-2">
                    <div class="relative w-1/2">
                        <select id="groupSelector" onchange="onGroupChange()" class="w-full p-2.5 bg-[#f5f5f7] rounded-xl text-[#1d1d1f] font-medium text-xs cursor-pointer text-center appearance-none">
                            <option value="newConcept">🎒 少儿新概念</option>
                            <option value="schoolClass">🏫 学校课堂组</option>
                            <option value="ieltsClass">🗽 雅思词汇</option>
                        </select>
                    </div>
                    <div class="relative w-1/2">
                        <select id="unitSelector" onchange="onUnitChange()" class="w-full p-2.5 bg-[#f5f5f7] rounded-xl text-[#1d1d1f] font-medium text-xs cursor-pointer text-center appearance-none"></select>
                    </div>
                </div>
                
                <div class="bg-[#f5f5f7] p-2 rounded-xl flex items-center justify-between">
                    <span class="text-[11px] font-medium text-[#86868b] pl-1">发音口音</span>
                    <div class="flex gap-4 pr-2">
                        <label class="flex items-center gap-1.5 text-xs font-normal text-[#1d1d1f] cursor-pointer">
                            <input type="radio" name="accentType" value="2" checked onchange="speakWord()" class="w-3.5 h-3.5 accent-[#0071e3]"> 美音
                        </label>
                        <label class="flex items-center gap-1.5 text-xs font-normal text-[#1d1d1f] cursor-pointer">
                            <input type="radio" name="accentType" value="1" onchange="speakWord()" class="w-3.5 h-3.5 accent-[#0071e3]"> 英音
                        </label>
                    </div>
                </div>

                <div class="flex flex-col gap-1 sm:flex-row bg-[#f5f5f7] p-0.5 rounded-xl">
                    <button id="mode-spell-btn" onclick="switchMode('spell')" class="flex-1 py-1.5 rounded-lg font-medium text-xs bg-white text-[#1d1d1f] shadow-xs transition">拼读挑战</button>
                    <button id="mode-card-btn" onclick="switchMode('card')" class="flex-1 py-1.5 rounded-lg font-medium text-xs text-[#86868b] transition">卡片背诵</button>
                </div>
            </div>
        </div>

        <div id="mainCard" class="bg-white p-5 rounded-[24px] shadow-[0_12px_30px_rgba(0,0,0,0.03)] border border-[#e8e8ed] relative overflow-hidden my-auto flex-1 flex flex-col justify-between cursor-pointer">
            <div>
                <div class="flex justify-between items-center text-[11px] font-medium text-[#86868b] mb-1 px-0.5">
                    <span id="progressTitle">冒险进度</span>
                    <span id="progressText" class="text-[#0071e3]">0%</span>
                </div>
                <div class="progress-container">
                    <div id="progressBar" class="progress-bar" style="width: 0%"></div>
                </div>
            </div>

            <div id="word-display" class="p-4 bg-[#f5f5f7]/60 rounded-xl text-center flex-1 flex flex-col justify-center items-center min-h-[160px] relative">
                <div class="flex flex-col sm:flex-row items-center justify-center gap-4 my-2 w-full">
                    <div id="emoji" class="text-6xl filter drop-shadow-sm flex-shrink-0">🍎</div>
                    <div id="netImageContainer" class="hidden rounded-xl overflow-hidden bg-white shadow-sm border border-[#e8e8ed] transition-all duration-300">
                        <img id="netImage" src="" class="w-full h-full object-cover" alt="illustration" onerror="handleImageError()">
                    </div>
                </div>
                
                <div id="cardTextDisplay" class="hidden flex flex-col items-center justify-center my-2">
                    <div id="cardWord" class="text-3xl font-bold tracking-tight text-[#1d1d1f]">apple</div>
                    <div id="cardPhonetic" class="text-xs text-[#86868b] font-mono mt-0.5"></div>
                    <div id="cardDesc" class="text-base text-[#86868b] font-medium mt-1">苹果</div>
                </div>

                <div id="hintBtnContainer" class="min-h-[28px] flex items-center justify-center w-full">
                    <div id="descContainer" class="hidden flex flex-col items-center gap-0.5">
                        <span id="desc" class="text-sm text-[#1d1d1f] font-medium">正在加载...</span>
                        <span id="phonetic" class="text-xs text-[#86868b] font-mono"></span>
                    </div>
                    <button id="hintBtn" onclick="event.stopPropagation(); toggleHint();" class="text-[11px] bg-white border border-[#d2d2d7] text-[#1d1d1f] px-3 py-1 rounded-full shadow-xs hover:bg-[#f5f5f7]">显示中文提示</button>
                    <span id="cardTip" class="hidden text-[11px] text-[#86868b] bg-[#e8e8ed] px-2.5 py-0.5 rounded-full">轻点卡片显示答案 / 支持键盘快捷键</span>
                </div>
                
                <div id="localDropZone" class="hidden p-3 border border-dashed border-[#d2d2d7] bg-white rounded-xl text-[11px] text-[#86868b] cursor-pointer w-full text-center">
                    请点击此处手动选中本地词库 CSV 文件
                    <input type="file" id="localFileInp" class="hidden" accept=".csv" onchange="handleFileSelect(this)">
                </div>

                <div id="letterSlots" class="flex justify-center flex-wrap gap-1.5 text-xl font-semibold text-[#1d1d1f] tracking-wide min-h-[48px]"></div>
            </div>

            <input type="text" id="userInput" class="ghost-input" autocomplete="off" spellcheck="false" oninput="filterInput(this)" onkeydown="if(event.key==='Enter') check()">
            
            <div id="spellActionButtons" class="grid grid-cols-2 gap-2 mt-4">
                <button onclick="event.stopPropagation(); speakWord();" class="bg-[#f5f5f7] hover:bg-[#e8e8ed] text-[#0071e3] py-2.5 rounded-xl font-medium text-xs flex items-center justify-center gap-1"><span>听发音 🔊</span></button>
                <button onclick="event.stopPropagation(); check();" class="bg-[#0071e3] hover:bg-[#0077ed] text-white py-2.5 rounded-xl font-medium text-xs shadow-sm">检查结果</button>
            </div>

            <div id="cardActionButtons" class="hidden flex flex-col gap-2.5 mt-4 w-full">
                <!-- 未翻面状态：只显示查看答案 -->
                <button id="showAnswerBtn" onclick="event.stopPropagation(); flipToBack();" class="w-full bg-[#0071e3] hover:bg-[#0077ed] text-white py-3 rounded-xl font-semibold text-sm shadow-sm transition active:scale-95">
                    👀 显示答案 (Show Answer)
                </button>
                
                <!-- 已翻面状态：展示 Anki 评分梯度 -->
                <div id="ankiGradingButtons" class="hidden grid grid-cols-3 gap-2 w-full">
                    <button onclick="event.stopPropagation(); handleAnkiFeedback('again');" class="bg-[#ff3b30]/10 hover:bg-[#ff3b30]/20 text-[#ff3b30] py-2.5 rounded-xl font-bold text-xs transition border border-[#ff3b30]/30 active:scale-95 flex flex-col items-center">
                        <span>🔴 重来</span>
                        <span class="text-[9px] font-normal opacity-70">Again</span>
                    </button>
                    <button onclick="event.stopPropagation(); handleAnkiFeedback('good');" class="bg-[#ff9500]/10 hover:bg-[#ff9500]/20 text-[#ff9500] py-2.5 rounded-xl font-bold text-xs transition border border-[#ff9500]/30 active:scale-95 flex flex-col items-center">
                        <span>🟡 一般</span>
                        <span class="text-[9px] font-normal opacity-70">Good</span>
                    </button>
                    <button onclick="event.stopPropagation(); handleAnkiFeedback('easy');" class="bg-[#34c759]/10 hover:bg-[#34c759]/20 text-[#34c759] py-2.5 rounded-xl font-bold text-xs transition border border-[#34c759]/30 active:scale-95 flex flex-col items-center">
                        <span>🟢 简单</span>
                        <span class="text-[9px] font-normal opacity-70">Easy</span>
                    </button>
                </div>
            </div>

            <button onclick="event.stopPropagation(); reviewWrongWords();" id="reviewBtn" class="w-full bg-[#ff3b30] hover:bg-[#ff453a] text-white py-2 rounded-xl font-medium text-xs hidden mt-2 shadow-sm">温习错题库 (0)</button>
        </div>

        <div id="virtualKeyboard" class="w-full bg-[#1c1c1e] p-2 pb-5 rounded-2xl shadow-2xl flex flex-col gap-1.5 mt-3">
            <div class="flex justify-center gap-1" id="kbd-row1"></div>
            <div class="flex justify-center gap-1" id="kbd-row2"></div>
            <div class="flex justify-center gap-1" id="kbd-row3"></div>
        </div>
    </div>

    <audio id="globalAudioPlayer" style="display: none;"></audio>

    <script>
        const CORRECT_PASSWORD = '666';
        const COURSE_DATA = {
            newConcept: [
                { text: "Unit 1 Lesson 1", value: "data/unit1_lesson1.csv" },
                { text: "Unit 1 Lesson 2", value: "data/unit1_lesson2.csv" },
                { text: "Unit 2 Lesson 3", value: "data/unit2_lesson3.csv" },
                { text: "Unit 2 Lesson 4", value: "data/unit2_lesson4.csv" },
                { text: "Unit 3 Lesson 5", value: "data/unit3_lesson5.csv" },
                { text: "Unit 3 Lesson 6", value: "data/unit3_lesson6.csv" },
                { text: "Unit 4 Lesson 7", value: "data/unit4_lesson7.csv" },
                { text: "Unit 5 Lesson 9", value: "data/unit5_lesson9.csv" },
                { text: "Unit 5 Lesson 10", value: "data/unit5_lesson10.csv" },
                { text: "Unit 6 Lesson 11", value: "data/unit6_lesson11.csv" },
                { text: "Unit 6 Lesson 12", value: "data/unit6_lesson12.csv" },
                { text: "Unit 7 Lesson 13", value: "data/unit7_lesson13.csv" }
            ],
            schoolClass: [
                { text: "课堂组 Unit 1", value: "data/school_unit1.csv" },
                { text: "课堂组 Unit 2", value: "data/school_unit2.csv" },
                { text: "课堂组 Unit 3", value: "data/school_unit3.csv" },
                { text: "课堂组 Unit 4", value: "data/school_unit4.csv" },
                { text: "课堂组 Unit 5", value: "data/school_unit5.csv" },
                { text: "课堂组 Unit 6", value: "data/school_unit6.csv" },
                { text: "课堂组 Unit 7", value: "data/school_unit7.csv" },
                { text: "课堂组 Unit 8", value: "data/school_unit8.csv" },
                { text: "课堂组 months", value: "data/school_months.csv" },
                { text: "课堂组 Cardinal numbers", value: "data/school_cardinal_numbers.csv" },
                { text: "课堂组 Ordinal numbers", value: "data/school_ordinal_numbers.csv" }
            ],
            ieltsClass: [
                { text: "ives_Business_Economy", value: "data/ives_Business_Economy.csv" },
                { text: "ives_Education_Learning", value: "data/ives_Education_Learning.csv" },
                { text: "ives_Emotions_Abstract", value: "data/ives_Emotions_Abstract.csv" },
                { text: "ives_Environment_Nature", value: "data/ives_Environment_Nature.csv" },
                { text: "ives_Health_Body", value: "data/ives_Health_Body.csv" },
                { text: "ives_Science_Technology", value: "data/ives_Science_Technology.csv" },
                { text: "ives_Society_People", value: "data/ives_Society_People.csv" },
                { text: "ives_Travel_Transport", value: "data/ives_Travel_Transport.csv" }
            ] 
        };

        const KBD_ROWS = [
            ["q","w","e","r","t","y","u","i","o","p"],
            ["a","s","d","f","g","h","j","k","l"],
            ["z","x","c","v","b","n","m", "⌫"]
        ];

        let currentInputValue = ""; 
        let maxAllowedLetters = 0;  
        let currentMode = 'spell';
        let cardSide = 'front';
        let wordBank = [], wrongWords = [];
        let masteredWords = new Set(); // 记录已经熟练掌握的单词(Easy)
        let currentWord = {}; let currentIndex = 0;
        let isReviewMode = false;
        let imgRetryCount = 0; // 图片失败重试机制计数器

        let touchStartX = 0;
        let touchStartY = 0;

        function filterInput(input) {
            currentInputValue = input.value.replace(/[^a-zA-Z]/g, '').toLowerCase();
            if (currentInputValue.length > maxAllowedLetters) {
                currentInputValue = currentInputValue.slice(0, maxAllowedLetters);
            }
            input.value = currentInputValue;
            updateSlotsHighlight();
        }

        function updateSlotsHighlight() {
            const slots = document.getElementById('letterSlots').children;
            let letterIdx = 0; 
            for(let i=0; i<slots.length; i++) {
                if(slots[i].dataset.special === "true") continue; 
                if(letterIdx < currentInputValue.length) {
                    slots[i].innerText = currentInputValue[letterIdx];
                    slots[i].className = "text-[#0071e3] font-bold border-b-2 border-[#0071e3] px-1 min-w-[14px] text-center lowercase";
                } else {
                    slots[i].innerText = "•";
                    slots[i].className = "text-[#d2d2d7] px-1 min-w-[14px] text-center";
                }
                letterIdx++;
            }
        }

        function renderVirtualKeyboard() {
            for(let rowIdx = 0; rowIdx < 3; rowIdx++) {
                const rowContainer = document.getElementById(`kbd-row${rowIdx+1}`);
                rowContainer.innerHTML = "";
                KBD_ROWS[rowIdx].forEach(key => {
                    const btn = document.createElement('button');
                    btn.innerText = key;
                    if(key === "⌫") {
                        btn.className = "flex-1 bg-[#636366] text-white font-normal text-base py-2.5 rounded-md active:bg-[#48484a] transition touch-none shadow-xs";
                        btn.onclick = (e) => { e.preventDefault(); handleKeyInput("BACKSPACE"); };
                    } else {
                        btn.className = "flex-1 bg-[#3a3a3c] text-white font-normal text-base py-2.5 rounded-md active:bg-[#636366] transition touch-none shadow-xs lowercase";
                        btn.onclick = (e) => { e.preventDefault(); handleKeyInput(key); };
                    }
                    rowContainer.appendChild(btn);
                });
            }
        }

        function handleKeyInput(key) {
            if(currentMode !== 'spell') return;
            if(key === "BACKSPACE") {
                currentInputValue = currentInputValue.slice(0, -1);
            } else {
                if(currentInputValue.length < maxAllowedLetters) {
                    currentInputValue += key.toLowerCase();
                }
            }
            document.getElementById('userInput').value = currentInputValue;
            updateSlotsHighlight();
        }

        function playSound(type) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                if(type === 'success') {
                    osc.frequency.setValueAtTime(523.25, ctx.currentTime);
                    osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.1, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                    osc.start(); osc.stop(ctx.currentTime + 0.3);
                } else {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(196.00, ctx.currentTime);
                    osc.frequency.linearRampToValueAtTime(130.81, ctx.currentTime + 0.2);
                    gain.gain.setValueAtTime(0.08, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.25);
                    osc.start(); osc.stop(ctx.currentTime + 0.25);
                }
                if (navigator.vibrate) {
                    if (type === 'success') navigator.vibrate(35); 
                    else navigator.vibrate([50, 40, 50]);
                }
            } catch(e){}
        }

        function verifyPassword() {
            const inputStyle = document.getElementById('sitePassword');
            const errorMsg = document.getElementById('passwordError');
            const passwordScreen = document.getElementById('passwordScreen');
            const gameContent = document.getElementById('gameContent');

            if (inputStyle.value === CORRECT_PASSWORD) {
                const player = document.getElementById('globalAudioPlayer');
                player.src = "data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA==";
                player.play().catch(()=>{});

                passwordScreen.classList.add('hidden');
                gameContent.classList.remove('hidden');
                document.body.classList.remove('touch-none'); 
                
                const savedGroup = localStorage.getItem('spell_saved_group');
                if (savedGroup && COURSE_DATA[savedGroup]) {
                    document.getElementById('groupSelector').value = savedGroup;
                }
                
                updateUnitOptions(true); 
                renderVirtualKeyboard();
                setupDragAndDrop();
                setupSwipeGestures(); 
                setupPhysicalKeyboardListener();
            } else {
                inputStyle.classList.add('shake'); errorMsg.classList.remove('hidden'); inputStyle.value = '';
                setTimeout(() => inputStyle.classList.remove('shake'), 400);
            }
        }

        function onGroupChange() {
            isReviewMode = false;
            masteredWords.clear();
            const selectValue = document.getElementById('groupSelector').value;
            localStorage.setItem('spell_saved_group', selectValue);
            localStorage.removeItem('spell_saved_index'); 
            
            if (COURSE_DATA[selectValue] && COURSE_DATA[selectValue].length > 0) {
                localStorage.setItem('spell_saved_unit', COURSE_DATA[selectValue][0].value);
            } else {
                localStorage.removeItem('spell_saved_unit');
            }
            updateUnitOptions(false);
        }

        function onUnitChange() {
            isReviewMode = false;
            masteredWords.clear();
            localStorage.setItem('spell_saved_unit', document.getElementById('unitSelector').value);
            localStorage.removeItem('spell_saved_index'); 
            loadNewUnit();
        }

        function updateUnitOptions(isInitialLoad = false) {
            const groupKey = document.getElementById('groupSelector').value;
            const unitSelector = document.getElementById('unitSelector');
            unitSelector.innerHTML = "";
            const units = COURSE_DATA[groupKey] || [];
            units.forEach(item => {
                const opt = document.createElement('option');
                opt.value = item.value; opt.text = item.text;
                unitSelector.appendChild(opt);
            });

            if (isInitialLoad) {
                const savedUnit = localStorage.getItem('spell_saved_unit');
                if (savedUnit) {
                    const exists = units.some(u => u.value === savedUnit);
                    if (exists) unitSelector.value = savedUnit;
                }
                
                const savedWrongs = localStorage.getItem('spell_saved_wrong_words');
                if (savedWrongs) {
                    try { wrongWords = JSON.parse(savedWrongs); updateWrongWordsButton(); } catch(e){}
                }
            }
            loadNewUnit(isInitialLoad);
        }

        function resetAllProgress() {
            if (confirm("确定要重置当前单元的学习进度吗？(错题库与掌握度都会清空)")) {
                currentIndex = 0;
                isReviewMode = false;
                masteredWords.clear();
                localStorage.removeItem('spell_saved_index');
                showCurrentIndexWord();
            }
        }

        function fetchNetworkImage(word) {
            if(!word) return;
            const cleanWord = word.trim().toLowerCase().replace(/['’]/g, '');
            const imgEl = document.getElementById('netImage');
            const container = document.getElementById('netImageContainer');
            
            container.classList.add('hidden'); 
            imgRetryCount = 0; // 重置计数器

            // 强制启用浏览器无来源规则（直接突破有道和必应防盗链拦截）
            imgEl.referrerPolicy = "no-referrer"; 

            // 首选源：必应无限制精选图片库
            imgEl.src = `https://tse1-mm.cn.bing.net/th/id/OIP?q=${encodeURIComponent(cleanWord + " illustration")}&w=240&h=240&c=7&rs=1&p=0&dpr=2`;

            imgEl.onload = function() {
                container.classList.remove('hidden');
            };
        }

        function handleImageError() {
            const cleanWord = currentWord.word ? currentWord.word.trim().toLowerCase().replace(/['’]/g, '') : '';
            const imgEl = document.getElementById('netImage');
            const container = document.getElementById('netImageContainer');

            if (imgRetryCount === 0 && cleanWord) {
                imgRetryCount = 1;
                // 备用源：如果必应未收录该词，自动无缝降级
                imgEl.src = `https://images.unsplash.com/photo-1546069901-ba9599a7e63c?q=80&w=240&auto=format&fit=crop&sig=${encodeURIComponent(cleanWord)}`;
            } else {
                container.classList.add('hidden'); 
            }
        }

        function fetchPhonetic(word) {
            if (!word) return;
            const cleanWord = word.trim().toLowerCase().replace(/[^a-zA-Z\s']/g, '');
            const phoneticEl = document.getElementById('phonetic');
            const cardPhoneticEl = document.getElementById('cardPhonetic');
            phoneticEl.innerText = ""; cardPhoneticEl.innerText = "";

            const url = `https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(cleanWord)}`;
            fetch(url)
                .then(res => { if(!res.ok) throw new Error(); return res.json(); })
                .then(data => {
                    if (data && data[0] && data[0].phonetic) {
                        const ph = data[0].phonetic;
                        phoneticEl.innerText = ph; cardPhoneticEl.innerText = ph;
                    } else if (data && data[0] && data[0].phonetics) {
                        const validPh = data[0].phonetics.find(p => p.text);
                        if (validPh) {
                            phoneticEl.innerText = validPh.text; cardPhoneticEl.innerText = validPh.text;
                        }
                    }
                }).catch(() => {
                    phoneticEl.innerText = ""; cardPhoneticEl.innerText = "";
                });
        }

        function parseRawText(text, isInitialLoad = false) {
            Papa.parse(text, {
                header: true, skipEmptyLines: true,
                complete: r => { 
                    if(r.data && r.data.length > 0) {
                        document.getElementById('localDropZone').classList.add('hidden');
                        wordBank = r.data; 
                        masteredWords.clear();
                        if (isInitialLoad) {
                            const savedIndex = localStorage.getItem('spell_saved_index');
                            currentIndex = savedIndex ? parseInt(savedIndex, 10) : 0;
                        } else {
                            currentIndex = 0;
                        }
                        showCurrentIndexWord(); 
                    } else { showLoadError("数据空空如也"); }
                }
            });
        }

        function loadCSV(fileName, isInitialLoad = false) {
            fetch(fileName)
                .then(r => { if (!r.ok) throw new Error(); return r.text(); })
                .then(t => parseRawText(t, isInitialLoad))
                .catch(() => { showLoadError("未自动发现词库文件"); });
        }

        function showLoadError(msg) {
            document.getElementById('desc').innerText = msg;
            document.getElementById('descContainer').classList.remove('hidden');
            document.getElementById('hintBtn').classList.add('hidden');
            document.getElementById('emoji').innerText = "📂";
            document.getElementById('netImageContainer').classList.add('hidden');
            document.getElementById('letterSlots').innerHTML = "";
            document.getElementById('localDropZone').classList.remove('hidden');
        }

        function loadNewUnit(isInitialLoad = false) {
            const fileName = document.getElementById('unitSelector').value;
            if(fileName) loadCSV(fileName, isInitialLoad);
        }

        function switchMode(mode) {
            currentMode = mode;
            cardSide = 'front';
            
            const spellBtn = document.getElementById('mode-spell-btn');
            const cardBtn = document.getElementById('mode-card-btn');
            const kbdArea = document.getElementById('virtualKeyboard');
            const spellActions = document.getElementById('spellActionButtons');
            const cardActions = document.getElementById('cardActionButtons');
            const hintBtn = document.getElementById('hintBtn');
            const cardTip = document.getElementById('cardTip');
            const slotsArea = document.getElementById('letterSlots');
            const cardText = document.getElementById('cardTextDisplay');

            if(mode === 'spell') {
                spellBtn.className = "flex-1 py-1.5 rounded-lg font-medium text-xs bg-white text-[#1d1d1f] shadow-xs transition";
                cardBtn.className = "flex-1 py-1.5 rounded-lg font-medium text-xs text-[#86868b] transition";
                kbdArea.classList.remove('hidden');
                spellActions.classList.remove('hidden');
                cardActions.classList.add('hidden');
                hintBtn.classList.remove('hidden');
                cardTip.classList.add('hidden');
                slotsArea.classList.remove('hidden');
                cardText.classList.add('hidden');
                document.getElementById('descContainer').classList.add('hidden');
                setTimeout(() => document.getElementById('userInput').focus(), 200);
            } else {
                spellBtn.className = "flex-1 py-1.5 rounded-lg font-medium text-xs text-[#86868b] transition";
                cardBtn.className = "flex-1 py-1.5 rounded-lg font-medium text-xs bg-white text-[#1d1d1f] shadow-xs transition";
                kbdArea.classList.add('hidden');
                spellActions.classList.add('hidden');
                cardActions.classList.remove('hidden');
                hintBtn.classList.add('hidden');
                cardTip.classList.remove('hidden');
                slotsArea.classList.add('hidden');
                cardText.classList.remove('hidden');
            }
            renderCurrentWordState();
            updateProgress();
        }

        function showCurrentIndexWord() {
            let activeBank = isReviewMode ? wrongWords : wordBank;
            document.getElementById('progressTitle').innerText = isReviewMode ? "错题消灭进度" : "冒险进度";

            if(activeBank.length === 0 && isReviewMode) {
                triggerEpicFireworks();
                alert("🎉 太牛了！错题库已经全部消灭干净！");
                isReviewMode = false;
                localStorage.removeItem('spell_saved_wrong_words');
                document.getElementById('reviewBtn').classList.add('hidden');
                currentIndex = 0;
                activeBank = wordBank;
            }

            if(currentIndex >= activeBank.length && activeBank.length > 0) {
                if(isReviewMode) {
                    triggerEpicFireworks();
                    alert("🎉 太牛了！错题库已经全部消灭干净！");
                    isReviewMode = false;
                    wrongWords = [];
                    localStorage.removeItem('spell_saved_wrong_words');
                    document.getElementById('reviewBtn').classList.add('hidden');
                } else {
                    triggerEpicFireworks();
                    alert("🎉 太棒了！您已顺利掌握本阶段所有卡片！");
                }
                currentIndex = 0;
                activeBank = isReviewMode ? wrongWords : wordBank;
            }

            if(currentIndex < 0) currentIndex = 0;
            if (!isReviewMode && currentMode === 'spell') localStorage.setItem('spell_saved_index', currentIndex);

            currentWord = activeBank[currentIndex];
            if(!currentWord || !currentWord.word) return;
            currentWord.word = currentWord.word.trim();

            cardSide = 'front';
            document.getElementById('emoji').innerText = currentWord.emoji || "📝";
            fetchNetworkImage(currentWord.word); 
            fetchPhonetic(currentWord.word);
            
            currentInputValue = "";
            document.getElementById('userInput').value = "";
            maxAllowedLetters = (currentWord.word || "").replace(/[^a-zA-Z]/g, '').length;
            
            renderSlots(currentWord.word);
            renderCurrentWordState();
            
            // 拼写模式下自动发音，卡片正面不发音（防止直接暴露答案的发音，等点击“显示答案”时发音）
            if (currentMode === 'spell') {
                speakWord();
            }
            updateProgress();
        }

        function renderCurrentWordState() {
            if(!currentWord || !currentWord.word) return;
            const descEl = document.getElementById('desc');
            const cardWordEl = document.getElementById('cardWord');
            const cardDescEl = document.getElementById('cardDesc');
            const showAnswerBtn = document.getElementById('showAnswerBtn');
            const ankiGradingButtons = document.getElementById('ankiGradingButtons');

            if(currentMode === 'spell') {
                descEl.innerText = currentWord.desc || "";
                document.getElementById('descContainer').classList.add('hidden'); 
                document.getElementById('hintBtn').classList.remove('hidden');
            } else {
                // Anki 卡片模式
                if(cardSide === 'front') {
                    // 正面：隐藏文字信息，只有图片和提示，不露底细
                    cardWordEl.className = "text-3xl font-bold tracking-tight text-transparent bg-[#e8e8ed] rounded-md px-10 select-none animate-pulse";
                    cardWordEl.innerText = "Secret Word";
                    cardDescEl.className = "text-base text-transparent bg-[#e8e8ed] rounded-md px-6 mt-1 select-none animate-pulse";
                    cardDescEl.innerText = "Description";
                    
                    showAnswerBtn.classList.remove('hidden');
                    ankiGradingButtons.classList.add('hidden');
                } else {
                    // 反面：完整呈现英文、音标、释义
                    cardWordEl.className = "text-3xl font-bold tracking-tight text-[#1d1d1f]";
                    cardWordEl.innerText = currentWord.word;
                    cardDescEl.className = "text-base text-[#86868b] font-medium mt-1 select-text";
                    cardDescEl.innerText = currentWord.desc || "";
                    
                    showAnswerBtn.classList.add('hidden');
                    ankiGradingButtons.classList.remove('hidden');
                }
            }
        }

        function flipToBack() {
            if(currentMode !== 'card') return;
            cardSide = 'back';
            renderCurrentWordState();
            speakWord(); // 翻面展示答案并自动播放发音，加深认知
        }

        function handleAnkiFeedback(level) {
            if (currentMode !== 'card') return;
            let activeBank = isReviewMode ? wrongWords : wordBank;
            const mainCard = document.getElementById('mainCard');
            
            if (level === 'again') {
                // 🔴 重来：把当前词放入队列最后重新轮询，触发挫折震动
                const current = activeBank.splice(currentIndex, 1)[0];
                activeBank.push(current);
                playSound('error');
                mainCard.classList.add('shake');
                setTimeout(() => mainCard.classList.remove('shake'), 400);
            } else if (level === 'good') {
                // 🟡 一般：熟练度还可以，保留在集合中，前进一步
                currentIndex++;
            } else if (level === 'easy') {
                // 🟢 简单：瞬间斩杀，加入已掌握，彻底剔除
                masteredWords.add(currentWord.word);
                activeBank.splice(currentIndex, 1);
                playSound('success');
                mainCard.classList.add('celebrate');
                setTimeout(() => mainCard.classList.remove('celebrate'), 400);
            }

            cardSide = 'front';
            
            // 💡 修复：如果全部掌握，先渲染 100% 进度，播放烟花，再延迟重置
            if (activeBank.length === 0) {
                // 强制将进度条和文字拉满
                document.getElementById('progressText').innerText = `已掌握: 100% (剩余 0 张)`;
                document.getElementById('progressBar').style.width = `100%`;
                
                triggerEpicFireworks();
                
                setTimeout(() => {
                    alert("🎉 恭喜！当前所有的卡片都已被你彻底消灭掌握！");
                    resetMasteredAndReload();
                }, 600); // 留出 600ms 让用户看到 100% 和烟花动效
            } else {
                if (currentIndex >= activeBank.length) {
                    currentIndex = 0;
                }
                showCurrentIndexWord();
            }
        }

        function resetMasteredAndReload() {
            masteredWords.clear();
            currentIndex = 0;
            isReviewMode = false;
            loadNewUnit();
        }

        function renderSlots(word) {
            const container = document.getElementById('letterSlots');
            container.innerHTML = "";
            if(!word) return;
            for(let i=0; i<word.length; i++) {
                const char = word[i];
                const span = document.createElement('span');
                if(/[a-zA-Z]/.test(char)) {
                    span.innerText = "•";
                    span.className = "text-[#d2d2d7] px-1 min-w-[14px] text-center";
                } else {
                    span.innerText = char;
                    span.className = "text-[#1d1d1f] px-0.5 min-w-[6px] text-center";
                    span.dataset.special = "true";
                }
                container.appendChild(span);
            }
        }

        document.getElementById('mainCard').addEventListener('click', function(e) {
            if (e.target.closest('button') || e.target.closest('select') || e.target.closest('input')) return;
            handleCardClick();
        });

        function handleCardClick() {
            if(currentMode === 'card') {
                if(cardSide === 'front') {
                    flipToBack();
                }
            } else {
                document.getElementById('userInput').focus();
            }
        }

        function toggleHint() {
            document.getElementById('descContainer').classList.remove('hidden');
            document.getElementById('hintBtn').classList.add('hidden');
        }

        function speakWord() {
            if(!currentWord || !currentWord.word) return;
            const accent = document.querySelector('input[name="accentType"]:checked').value || "2";
            const player = document.getElementById('globalAudioPlayer');
            player.src = `https://dict.youdao.com/dictvoice?audio=${encodeURIComponent(currentWord.word)}&type=${accent}`;
            player.play().catch(()=>{});
        }

        function check() {
            if(currentMode !== 'spell' || !currentWord.word) return;
            const target = currentWord.word.replace(/[^a-zA-Z]/g, '').toLowerCase();
            const mainCard = document.getElementById('mainCard');

            if(currentInputValue === target) {
                playSound('success');
                mainCard.classList.add('celebrate');
                
                setTimeout(() => {
                    mainCard.classList.remove('celebrate');
                    if(isReviewMode) {
                        wrongWords.splice(currentIndex, 1);
                        localStorage.setItem('spell_saved_wrong_words', JSON.stringify(wrongWords));
                        updateWrongWordsButton();
                        if (currentIndex >= wrongWords.length && wrongWords.length > 0) {
                            currentIndex = wrongWords.length - 1;
                        }
                    } else {
                        let activeBank = wordBank;
                        if(currentIndex === activeBank.length - 1) {
                             document.getElementById('progressText').innerText = `100%`;
                             document.getElementById('progressBar').style.width = `100%`;
                        }
                        currentIndex++;
                    }
                    showCurrentIndexWord();
                }, 400);
            } else {
                playSound('error');
                mainCard.classList.add('shake');
                if(!isReviewMode && !wrongWords.some(w => w.word === currentWord.word)) {
                    wrongWords.push(currentWord);
                    localStorage.setItem('spell_saved_wrong_words', JSON.stringify(wrongWords));
                    updateWrongWordsButton();
                }
                setTimeout(() => {
                    mainCard.classList.remove('shake');
                    currentInputValue = "";
                    document.getElementById('userInput').value = "";
                    updateSlotsHighlight();
                }, 400);
            }
        }

        function updateProgress() {
            let activeBank = isReviewMode ? wrongWords : wordBank;
            const total = activeBank.length + masteredWords.size;
            if(total === 0) {
                document.getElementById('progressText').innerText = `0%`;
                document.getElementById('progressBar').style.width = `0%`;
                return;
            }
            if (currentMode === 'spell') {
                const percent = Math.min(Math.round(((currentIndex) / activeBank.length) * 100), 100);
                document.getElementById('progressText').innerText = `${percent}%`;
                document.getElementById('progressBar').style.width = `${percent}%`;
            } else {
                // 如果已经没有剩余卡片，直接判定为 100%
                const percent = activeBank.length === 0 ? 100 : Math.min(Math.round((masteredWords.size / total) * 100), 99); 
                document.getElementById('progressText').innerText = `已掌握: ${percent}% (剩余 ${activeBank.length} 张)`;
                document.getElementById('progressBar').style.width = `${percent}%`;
            }
        }

        function updateWrongWordsButton() {
            const btn = document.getElementById('reviewBtn');
            btn.innerText = `温习错题库 (${wrongWords.length})`;
            if(wrongWords.length > 0) btn.classList.remove('hidden');
            else btn.classList.add('hidden');
        }

        function reviewWrongWords() {
            if(wrongWords.length === 0) return;
            isReviewMode = true;
            currentIndex = 0;
            showCurrentIndexWord();
        }

        function triggerEpicFireworks() {
            const duration = 2 * 1000;
            const end = Date.now() + duration;
            (function frame() {
                confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0, y: 0.8 } });
                confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1, y: 0.8 } });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        function setupDragAndDrop() {
            const zone = document.getElementById('localDropZone');
            zone.onclick = () => document.getElementById('localFileInp').click();
        }

        function handleFileSelect(input) {
            if(input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) { parseRawText(e.target.result); };
                reader.readAsText(input.files[0]);
            }
        }

        function setupSwipeGestures() {
            const mainCard = document.getElementById('mainCard');
            mainCard.addEventListener('touchstart', function(e) {
                touchStartX = e.changedTouches[0].screenX;
                touchStartY = e.changedTouches[0].screenY;
            }, {passive: true});

            mainCard.addEventListener('touchend', function(e) {
                if (currentMode !== 'card') return; 
                const touchEndX = e.changedTouches[0].screenX;
                const touchEndY = e.changedTouches[0].screenY;
                const diffX = touchEndX - touchStartX;
                const diffY = touchEndY - touchStartY;
                
                // Anki 模式中不再提供单纯的左右划页，而是通过自评控制卡片去向
                // 为配合手势，可以将手势映射为：右滑代表 Easy(3) / 左滑代表 Again(1)
                if (Math.abs(diffX) > 60 && Math.abs(diffX) > Math.abs(diffY)) {
                    if (cardSide === 'back') {
                        if (diffX < 0) {
                            handleAnkiFeedback('again'); // 向左划代表 Again
                        } else {
                            handleAnkiFeedback('easy');  // 向右划代表 Easy
                        }
                    } else if (cardSide === 'front') {
                        flipToBack();
                    }
                }
            }, {passive: true});
        }

        function setupPhysicalKeyboardListener() {
            window.addEventListener('keydown', function(e) {
                if (!document.getElementById('passwordScreen').classList.contains('hidden')) return;
                
                // 卡片背诵 Anki 模式快捷键适配 (空格翻转 / 键盘 1, 2, 3 评级)
                if (currentMode === 'card') {
                    if (e.key === ' ') {
                        e.preventDefault();
                        if (cardSide === 'front') {
                            flipToBack();
                        }
                    } else if (cardSide === 'back') {
                        if (e.key === '1') {
                            e.preventDefault();
                            handleAnkiFeedback('again');
                        } else if (e.key === '2') {
                            e.preventDefault();
                            handleAnkiFeedback('good');
                        } else if (e.key === '3') {
                            e.preventDefault();
                            handleAnkiFeedback('easy');
                        }
                    }
                    return;
                }
                
                // 拼写模式快捷键适配
                if (currentMode === 'spell') {
                    if (e.key === 'Backspace') {
                        e.preventDefault();
                        handleKeyInput('BACKSPACE');
                        return;
                    }
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        check();
                        return;
                    }
                    if (/^[a-zA-Z]$/.test(e.key)) {
                        e.preventDefault();
                        handleKeyInput(e.key.toLowerCase());
                    }
                }
            });
        }
    </script>
</body>
